services:
  - type: web
    name: unreel
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: SITE_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: MAIL_BRAND_NAME
        sync: false
      - key: MAIL_BRAND_COLOR
        sync: false
      - key: MAIL_LOGO_URL
        sync: false
      - key: INSTAGRAM_COOKIES_B64
        sync: false
      - key: YTDLP_COOKIES_B64
        sync: false
