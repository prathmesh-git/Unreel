    <g transform="translate(13,13)" stroke="#a78bfa" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="14" cy="14" r="12"/>
      <line x1="16.772" y1="9.2" x2="23.66" y2="21.128"/>
      <line x1="11.228" y1="9.2" x2="25" y2="9.2"/>
      <line x1="8.456" y1="14" x2="15.344" y2="2.072"/>
      <line x1="11.228" y1="18.8" x2="4.34" y2="6.872"/>
      <line x1="16.772" y1="18.8" x2="3" y2="18.8"/>
      <line x1="19.544" y1="14" x2="12.656" y2="25.928"/>
    </g>
    <text x="72" y="38" fill="#f8fafc" font-size="44" font-family="'Inter', Arial, sans-serif" font-weight="700">Unreel</text>
